# Popis akcie, dlzka najviac 255 znakov
info: "Pojďte si s námi užít týdenní soustředění plné her, matematických přednášek a hlavně zábavy ve skvělém kolektivu. Soustředění je převážně pro řešitele BRKOSu, ale ne vždy se zaplní všechna místa, takže se neváhejte přihlásit."
